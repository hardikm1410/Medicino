<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find a Doctor - Medicino</title>
    <!-- Use Tailwind CSS for a responsive, modern layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fc;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <!-- Header Section -->
    <header class="bg-white shadow-sm p-4 md:p-6 sticky top-0 z-50">
        <div class="container mx-auto flex items-center justify-between">
            <a href="/" class="text-2xl font-bold text-blue-700">Medicino</a>
            <nav class="flex items-center space-x-4">
                <a href="/dashboard" class="text-gray-600 hover:text-blue-700 transition-colors duration-200">Dashboard</a>
                <a href="/doctors" class="text-blue-700 font-semibold transition-colors duration-200">Find a Doctor</a>
                <a href="/logout" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors duration-200">Logout</a>
            </nav>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="container mx-auto p-4 md:p-8 flex-grow">
        <div class="bg-white p-6 md:p-8 rounded-xl shadow-lg">
            <h1 class="text-3xl font-bold text-center text-gray-800 mb-6 md:mb-8">Find a Doctor</h1>
            
            <!-- Search and Filter Section -->
            <div class="flex flex-col md:flex-row items-center justify-between mb-8 space-y-4 md:space-y-0 md:space-x-4">
                <!-- Search Input -->
                <div class="relative w-full md:w-1/2">
                    <input type="text" id="search-bar" placeholder="Search by name, hospital, or specialty..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors duration-200">
                    <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                
                <!-- Specialty Filter -->
                <div class="w-full md:w-1/4">
                    <select id="specialty-filter" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors duration-200">
                        <option value="all">All Specialties</option>
                        <!-- Options will be populated by JavaScript -->
                    </select>
                </div>
            </div>

            <!-- Doctor List Grid -->
            <div id="doctor-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Doctor cards will be dynamically inserted here -->
            </div>
            
            <!-- Loading and No Results State -->
            <div id="loading" class="text-center py-10 text-gray-500" style="display: none;">
                <p>Loading doctors...</p>
            </div>
            <div id="no-results" class="text-center py-10 text-gray-500" style="display: none;">
                <p>No doctors found matching your criteria.</p>
            </div>
        </div>
    </main>

    <!-- Footer Section -->
    <footer class="bg-gray-800 text-white p-4 text-center mt-auto">
        <p>&copy; 2024 Medicino. All rights reserved.</p>
    </footer>

    <!-- JavaScript for dynamic content -->
    <script src="{{ url_for('static', filename='doctor.js') }}"></script>
</body>
</html>
